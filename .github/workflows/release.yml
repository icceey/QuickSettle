name: Release

on:
  push:
    tags:
      - "v*"

env:
  TMLVERSION: v2026.01.3.1

jobs:
  release:
    name: Package and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache tModLoader
        id: cache-tml
        uses: actions/cache@v4
        with:
          path: /tmp/tModLoader
          key: tmodloader-${{ env.TMLVERSION }}

      - name: Download tModLoader
        if: steps.cache-tml.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://github.com/tModLoader/tModLoader/releases/download/${{ env.TMLVERSION }}/tModLoader.zip" \
            -o /tmp/tModLoader.zip
          mkdir -p /tmp/tModLoader
          unzip -q /tmp/tModLoader.zip -d /tmp/tModLoader

      - name: Restore
        env:
          TMLInstallDir: /tmp/tModLoader
        run: dotnet restore QuickSettle.csproj

      - name: Build and Package
        env:
          TMLInstallDir: /tmp/tModLoader
        run: |
          mkdir -p /tmp/tml_save/Mods
          dotnet build QuickSettle.csproj --no-restore \
            -p:ExtraBuildModFlags="-tmlsavedirectory /tmp/tml_save -nosteam"

      - name: Locate tmod file
        id: find_tmod
        run: |
          TMOD=$(find /tmp/tml_save -name "*.tmod" | head -1)
          echo "tmod_path=${TMOD}" >> "$GITHUB_OUTPUT"
          echo "Found: ${TMOD}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_tmod.outputs.tmod_path }}
          generate_release_notes: true
