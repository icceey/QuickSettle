name: Format Check

on:
  push:
    branches: ["**"]
  pull_request:

env:
  TMLVERSION: v2026.01.3.1

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache tModLoader
        id: cache-tml
        uses: actions/cache@v4
        with:
          path: /tmp/tModLoader
          key: tmodloader-${{ env.TMLVERSION }}

      - name: Download tModLoader
        if: steps.cache-tml.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://github.com/tModLoader/tModLoader/releases/download/${{ env.TMLVERSION }}/tModLoader.zip" \
            -o /tmp/tModLoader.zip
          mkdir -p /tmp/tModLoader
          unzip -q /tmp/tModLoader.zip -d /tmp/tModLoader

      - name: Restore
        env:
          TMLInstallDir: /tmp/tModLoader
        run: dotnet restore QuickSettle.csproj

      - name: Check Format
        env:
          TMLInstallDir: /tmp/tModLoader
        run: dotnet format QuickSettle.csproj --verify-no-changes --no-restore
